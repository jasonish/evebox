name: MacOS Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install rust
      - run: cargo build
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install node
      - run: brew install rust
      - run: cargo build
